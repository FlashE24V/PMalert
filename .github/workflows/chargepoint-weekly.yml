name: Unreachable Count Update - Daily Reset Weekly

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC).
    # More frequent runs = better chance of catching real intra-day
    # unreachable/reachable flapping for accurate event counts.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you click "Run workflow" manually to test

permissions:
  contents: write   # needed so the workflow can commit the updated CSVs back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unreachable/PM count updater
        env:
          CP_USERNAME: ${{ secrets.CP_USERNAME }}
          CP_PASSWORD: ${{ secrets.CP_PASSWORD }}
          THRESHOLD_HOURS: "24"
        run: python unreachable_count_update_daily_reset_weekly.py

      - name: Commit updated CSVs/JSON back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in stations_per_station_slim.csv status_latest_slim.csv \
                   alerts_unreachable_gt24.json unreachable_event_counts.csv \
                   unreachable_new.csv pm_new.csv \
                   unreachable_weekly_history.csv pm_weekly_history.csv \
                   .cp_unreach_state.json .cp_weekly_state.json chargepoint_refresh.log; do
            if [ -f "$f" ]; then
              git add "$f"
            else
              echo "Skipping $f (does not exist yet)"
            fi
          done
          git diff --cached --quiet || git commit -m "Daily unreachable/PM count update $(date -u +%Y-%m-%d)"
          git push
